name: Build Synapse Android

on:
  push:
    branches:
      - "**"
    paths:
      - "android/**"
      - ".github/workflows/synapse-android.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "android/**"
      - ".github/workflows/synapse-android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: Android Gradle verification
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.1"
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      - name: Read app version
        run: |
          echo "SYNAPSE_ANDROID_VERSION_NAME=1.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "SYNAPSE_ANDROID_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Run unit tests
        env:
          SYNAPSE_ANDROID_VERSION_NAME: ${{ env.SYNAPSE_ANDROID_VERSION_NAME }}
          SYNAPSE_ANDROID_VERSION_CODE: ${{ env.SYNAPSE_ANDROID_VERSION_CODE }}
          SYNAPSE_API_BASE_URL: ${{ secrets.SYNAPSE_API_BASE_URL }}
          SYNAPSE_CERTIFICATE_PINS: ${{ secrets.SYNAPSE_CERTIFICATE_PINS }}
          SYNAPSE_REQUIRE_CERTIFICATE_PINS: ${{ secrets.SYNAPSE_REQUIRE_CERTIFICATE_PINS }}
        run: gradle testDebugUnitTest --no-daemon --warning-mode all

      - name: Run Android lint
        env:
          SYNAPSE_ANDROID_VERSION_NAME: ${{ env.SYNAPSE_ANDROID_VERSION_NAME }}
          SYNAPSE_ANDROID_VERSION_CODE: ${{ env.SYNAPSE_ANDROID_VERSION_CODE }}
          SYNAPSE_API_BASE_URL: ${{ secrets.SYNAPSE_API_BASE_URL }}
          SYNAPSE_CERTIFICATE_PINS: ${{ secrets.SYNAPSE_CERTIFICATE_PINS }}
          SYNAPSE_REQUIRE_CERTIFICATE_PINS: ${{ secrets.SYNAPSE_REQUIRE_CERTIFICATE_PINS }}
        run: gradle lintDebug --no-daemon --warning-mode all

      - name: Prepare release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing_secrets=()
          for secret_name in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              missing_secrets+=("$secret_name")
            fi
          done

          if [ "${#missing_secrets[@]}" -gt 0 ]; then
            if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
              echo "Release signing secrets are unavailable: ${missing_secrets[*]}; pull request APK will be unsigned."
              exit 0
            fi
            for secret_name in "${missing_secrets[@]}"; do
              echo "::error::$secret_name repository secret is required for signed Android releases."
            done
            exit 1
          fi

          keystore_file="$RUNNER_TEMP/synapse-release.jks"
          if ! printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_file"; then
            echo "::error::KEYSTORE_BASE64 is not valid base64."
            exit 1
          fi

          echo "KEYSTORE_FILE=$keystore_file" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          SYNAPSE_ANDROID_VERSION_NAME: ${{ env.SYNAPSE_ANDROID_VERSION_NAME }}
          SYNAPSE_ANDROID_VERSION_CODE: ${{ env.SYNAPSE_ANDROID_VERSION_CODE }}
          SYNAPSE_API_BASE_URL: ${{ secrets.SYNAPSE_API_BASE_URL }}
          SYNAPSE_CERTIFICATE_PINS: ${{ secrets.SYNAPSE_CERTIFICATE_PINS }}
          SYNAPSE_REQUIRE_CERTIFICATE_PINS: ${{ secrets.SYNAPSE_REQUIRE_CERTIFICATE_PINS }}
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon --warning-mode all

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: synapse-android-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synapse-android-verification-reports
          path: |
            android/app/build/reports/tests/**
            android/app/build/reports/lint-results-debug.html
            android/app/build/reports/lint-results-debug.xml
            android/build/reports/problems/**
          retention-days: 14
