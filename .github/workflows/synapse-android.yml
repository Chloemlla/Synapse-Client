name: Build Synapse Android

on:
  push:
    branches:
      - "**"
    paths:
      - "android/**"
      - ".github/workflows/synapse-android.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "android/**"
      - ".github/workflows/synapse-android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: Android Gradle verification
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.1"
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      - name: Read app version
        run: |
          echo "SYNAPSE_ANDROID_VERSION_NAME=1.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "SYNAPSE_ANDROID_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Run unit tests
        env:
          SYNAPSE_ANDROID_VERSION_NAME: ${{ env.SYNAPSE_ANDROID_VERSION_NAME }}
          SYNAPSE_ANDROID_VERSION_CODE: ${{ env.SYNAPSE_ANDROID_VERSION_CODE }}
          SYNAPSE_API_BASE_URL: ${{ secrets.SYNAPSE_API_BASE_URL }}
          SYNAPSE_CERTIFICATE_PINS: ${{ secrets.SYNAPSE_CERTIFICATE_PINS }}
          SYNAPSE_REQUIRE_CERTIFICATE_PINS: ${{ secrets.SYNAPSE_REQUIRE_CERTIFICATE_PINS }}
        run: gradle testDebugUnitTest --no-daemon --warning-mode all

      - name: Run Android lint
        env:
          SYNAPSE_ANDROID_VERSION_NAME: ${{ env.SYNAPSE_ANDROID_VERSION_NAME }}
          SYNAPSE_ANDROID_VERSION_CODE: ${{ env.SYNAPSE_ANDROID_VERSION_CODE }}
          SYNAPSE_API_BASE_URL: ${{ secrets.SYNAPSE_API_BASE_URL }}
          SYNAPSE_CERTIFICATE_PINS: ${{ secrets.SYNAPSE_CERTIFICATE_PINS }}
          SYNAPSE_REQUIRE_CERTIFICATE_PINS: ${{ secrets.SYNAPSE_REQUIRE_CERTIFICATE_PINS }}
        run: gradle lintDebug --no-daemon --warning-mode all

      - name: Build release APK
        env:
          SYNAPSE_ANDROID_VERSION_NAME: ${{ env.SYNAPSE_ANDROID_VERSION_NAME }}
          SYNAPSE_ANDROID_VERSION_CODE: ${{ env.SYNAPSE_ANDROID_VERSION_CODE }}
          SYNAPSE_API_BASE_URL: ${{ secrets.SYNAPSE_API_BASE_URL }}
          SYNAPSE_CERTIFICATE_PINS: ${{ secrets.SYNAPSE_CERTIFICATE_PINS }}
          SYNAPSE_REQUIRE_CERTIFICATE_PINS: ${{ secrets.SYNAPSE_REQUIRE_CERTIFICATE_PINS }}
        run: gradle assembleRelease --no-daemon --warning-mode all

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: synapse-android-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synapse-android-verification-reports
          path: |
            android/app/build/reports/tests/**
            android/app/build/reports/lint-results-debug.html
            android/app/build/reports/lint-results-debug.xml
            android/build/reports/problems/**
          retention-days: 14
