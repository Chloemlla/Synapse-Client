name: Build Synapse Android

on:
  push:
    branches:
      - "**"
    paths:
      - "android/**"
      - ".github/scripts/**"
      - ".github/workflows/synapse-android.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "android/**"
      - ".github/scripts/**"
      - ".github/workflows/synapse-android.yml"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a signed GitHub Release from main"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  verify:
    name: Android Gradle verification
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Java 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d
        with:
          gradle-version: "9.5.1"
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      - name: Run repository policy checks
        working-directory: .
        run: python3 .github/scripts/validate-synapse-android-policy.py

      - name: Read app version
        run: |
          VERSION_NAME="1.0.${GITHUB_RUN_NUMBER}"
          SHORT_HASH="${GITHUB_SHA::8}"
          echo "SYNAPSE_ANDROID_VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"
          echo "SYNAPSE_ANDROID_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "SYNAPSE_SHORT_HASH=${SHORT_HASH}" >> "$GITHUB_ENV"
          echo "SYNAPSE_ANDROID_RELEASE_VERSION=${VERSION_NAME}-${SHORT_HASH}" >> "$GITHUB_ENV"

      - name: Run unit tests
        env:
          SYNAPSE_ANDROID_VERSION_NAME: ${{ env.SYNAPSE_ANDROID_VERSION_NAME }}
          SYNAPSE_ANDROID_VERSION_CODE: ${{ env.SYNAPSE_ANDROID_VERSION_CODE }}
          SYNAPSE_API_BASE_URL: ${{ secrets.SYNAPSE_API_BASE_URL }}
        run: gradle testProductionDebugUnitTest --no-daemon --warning-mode all

      - name: Run Android lint
        env:
          SYNAPSE_ANDROID_VERSION_NAME: ${{ env.SYNAPSE_ANDROID_VERSION_NAME }}
          SYNAPSE_ANDROID_VERSION_CODE: ${{ env.SYNAPSE_ANDROID_VERSION_CODE }}
          SYNAPSE_API_BASE_URL: ${{ secrets.SYNAPSE_API_BASE_URL }}
        run: gradle lintProductionDebug --no-daemon --warning-mode all

      - name: Build release APK for verification
        env:
          SYNAPSE_ANDROID_VERSION_NAME: ${{ env.SYNAPSE_ANDROID_VERSION_NAME }}
          SYNAPSE_ANDROID_VERSION_CODE: ${{ env.SYNAPSE_ANDROID_VERSION_CODE }}
          SYNAPSE_API_BASE_URL: ${{ secrets.SYNAPSE_API_BASE_URL }}
        run: gradle assembleProductionRelease assembleLegacyRelease --no-daemon --warning-mode all

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: synapse-android-verification-reports
          path: |
            android/app/build/reports/tests/**
            android/app/build/reports/lint-results-productionDebug.html
            android/app/build/reports/lint-results-productionDebug.xml
            android/build/reports/problems/**
          retention-days: 14

  release:
    name: Android signed release
    needs: verify
    if: >-
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || inputs.publish_release == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Java 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d
        with:
          gradle-version: "9.5.1"
          cache-read-only: false
          cache-cleanup: on-success

      - name: Read app version
        run: |
          VERSION_NAME="1.0.${GITHUB_RUN_NUMBER}"
          SHORT_HASH="${GITHUB_SHA::8}"
          echo "SYNAPSE_ANDROID_VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"
          echo "SYNAPSE_ANDROID_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "SYNAPSE_SHORT_HASH=${SHORT_HASH}" >> "$GITHUB_ENV"
          echo "SYNAPSE_ANDROID_RELEASE_VERSION=${VERSION_NAME}-${SHORT_HASH}" >> "$GITHUB_ENV"

      - name: Validate release secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SYNAPSE_API_BASE_URL: ${{ secrets.SYNAPSE_API_BASE_URL }}
        run: |
          missing_secrets=()
          for secret_name in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD SYNAPSE_API_BASE_URL; do
            if [ -z "${!secret_name}" ]; then
              missing_secrets+=("$secret_name")
            fi
          done

          if [ "${#missing_secrets[@]}" -gt 0 ]; then
            for secret_name in "${missing_secrets[@]}"; do
              echo "::error::$secret_name repository secret is required for signed Android releases."
            done
            exit 1
          fi

      - name: Prepare release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          keystore_file="$RUNNER_TEMP/synapse-release.jks"
          if ! printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_file"; then
            echo "::error::KEYSTORE_BASE64 is not valid base64."
            exit 1
          fi

          echo "KEYSTORE_FILE=$keystore_file" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          SYNAPSE_ANDROID_VERSION_NAME: ${{ env.SYNAPSE_ANDROID_VERSION_NAME }}
          SYNAPSE_ANDROID_VERSION_CODE: ${{ env.SYNAPSE_ANDROID_VERSION_CODE }}
          SYNAPSE_API_BASE_URL: ${{ secrets.SYNAPSE_API_BASE_URL }}
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleProductionRelease assembleLegacyRelease --no-daemon --warning-mode all

      - name: Prepare release assets
        run: |
          mkdir -p "$GITHUB_WORKSPACE/release-assets"
          VERSION="${SYNAPSE_ANDROID_RELEASE_VERSION}"
          APK_DIR="app/build/outputs/apk/production/release"
          AGGREGATED_APK="$(find "$APK_DIR" -maxdepth 1 -type f \( -name "app-production-universal-release.apk" -o -name "app-production-release.apk" \) | head -n 1)"

          if [ -z "$AGGREGATED_APK" ]; then
            echo "Aggregated signed release APK was not found."
            ls -lh "$APK_DIR"
            exit 1
          fi

          cp "$AGGREGATED_APK" "$GITHUB_WORKSPACE/release-assets/Synapse_android_${VERSION}.apk"

          for variant in armeabi-v7a arm64-v8a x86 x86_64; do
            VARIANT_APK="$(find "$APK_DIR" -maxdepth 1 -type f -name "app-production-${variant}-release.apk" | head -n 1)"
            if [ -n "$VARIANT_APK" ]; then
              cp "$VARIANT_APK" "$GITHUB_WORKSPACE/release-assets/Synapse_android_${VERSION}_${variant}.apk"
            fi
          done

          (
            cd "$GITHUB_WORKSPACE/release-assets"
            sha256sum *.apk > checksums.txt
          )

          TAG_NAME="v${VERSION}"
          RELEASE_BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}"
          python3 - "$VERSION" "${SYNAPSE_ANDROID_VERSION_CODE}" "$TAG_NAME" "$RELEASE_BASE_URL" "${GITHUB_REPOSITORY}" "$GITHUB_WORKSPACE/release-assets" <<'PY'
          import json
          import pathlib
          import sys

          version_name, version_code, tag_name, release_base_url, repository, asset_dir_raw = sys.argv[1:7]
          asset_dir = pathlib.Path(asset_dir_raw)
          checksums = {}
          for line in (asset_dir / "checksums.txt").read_text(encoding="utf-8").splitlines():
              parts = line.split()
              if len(parts) >= 2:
                  checksums[pathlib.Path(parts[-1]).name] = parts[0].lower()

          def abi_for(name):
              for abi in ("armeabi-v7a", "arm64-v8a", "x86", "x86_64"):
                  if name.endswith(f"_{abi}.apk"):
                      return abi
              return "universal"

          assets = []
          for apk in sorted(asset_dir.glob("*.apk")):
              name = apk.name
              assets.append({
                  "abi": abi_for(name),
                  "name": name,
                  "url": f"{release_base_url}/{name}",
                  "sha256": checksums[name],
                  "sizeBytes": apk.stat().st_size,
                  "contentType": "application/vnd.android.package-archive",
              })

          primary = next((asset for asset in assets if asset["abi"] == "universal"), assets[0])
          manifest = {
              "schemaVersion": 1,
              "versionCode": int(version_code),
              "versionName": version_name,
              "tagName": tag_name,
              "channel": "stable",
              "rollout": "100%",
              "forceUpdate": False,
              "releaseUrl": f"https://github.com/{repository}/releases/tag/{tag_name}",
              "sha256": primary["sha256"],
              "fullApkUrl": primary["url"],
              "fullApkSha256": primary["sha256"],
              "fullApkSizeBytes": primary["sizeBytes"],
              "assets": assets,
              "patches": [],
          }
          (asset_dir / "release-manifest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: synapse-android-release-assets
          path: release-assets/*
          if-no-files-found: error
          retention-days: 30

      - name: Automatic release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          make_latest: true
          generate_release_notes: true
          tag_name: "v${{ env.SYNAPSE_ANDROID_RELEASE_VERSION }}"
          prerelease: false
          name: "Synapse Android ${{ env.SYNAPSE_ANDROID_RELEASE_VERSION }}"
          files: release-assets/*
